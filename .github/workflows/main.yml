name: Access Issue Information
on:
  issues:
    types: [opened, reopened]  # Triggers on issue "opened" and "reopened" events

jobs:
  access_issue_info:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Print Issue Information
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_ASSIGNEES: ${{ github.event.issue.assignees && join(github.event.issue.assignees.*.login, ', ') || 'None' }}
          ISSUE_LABELS: ${{ github.event.issue.labels && join(github.event.issue.labels.*.name, ', ') || 'None' }}
        run: |
          echo "Issue Number: ${ISSUE_NUMBER}"
          echo "Issue Title: ${ISSUE_TITLE}"
          echo "Issue Body: ${ISSUE_BODY}"
          echo "Issue Assignees: ${ISSUE_ASSIGNEES}"
          echo "Issue Labels: ${ISSUE_LABELS}"
